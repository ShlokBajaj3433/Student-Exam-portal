spring.application.name=restapi

# ── Server ──────────────────────────────────────────────────────────────────
server.port=8081

# ── Datasource (Supabase / PostgreSQL) ──────────────────────────────────────
# Set environment variables before starting:
#   SUPABASE_DB_URL=jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
#   SUPABASE_DB_USER=postgres
#   SUPABASE_DB_PASSWORD=<your-password>
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Default fetch type is LAZY; explicit here for clarity
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false

# ── JWT ──────────────────────────────────────────────────────────────────────
# Set APP_JWT_SECRET to a Base64-encoded 256-bit (32-byte) random key
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.examportal=DEBUG
logging.level.org.springframework.security=INFO
